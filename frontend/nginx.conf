server {
    listen 80;
    server_name localhost;

    # Where the React app files are stored
    root /usr/share/nginx/html;
    index index.html;

    # Important: SPA routing rule
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
