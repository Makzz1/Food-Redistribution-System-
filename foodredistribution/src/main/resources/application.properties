spring.application.name=foodredistribution

# ── Database (Supabase PostgreSQL) ───────────────────────────────────────
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.jvhuduwdjgawxtprfwrh
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Use 'update' for dev, override to 'validate' in production
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ──────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# ── Email (Gmail SMTP) ──────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=naahuh.foodwaste@gmail.com
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Multipart upload limits ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# Serve uploaded files at /uploads/**
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# ── Claim lifecycle timing (minutes) ────────────────────────────────────
# How long the donor must wait before marking receiver as no-show
claim.no-show.wait-minutes=30
# How long either party must wait before raising a dispute
# (gives the other party a fair chance to arrive or respond)
claim.dispute.wait-minutes=45

# ── Redis Caching ───────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Supabase connection pool hardening
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── OAuth2 Google Sign-In ───────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile, email

# ── Dynamic URLs (override these in production via env vars) ────────────
app.backend-url=${BACKEND_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost}

# ── Storage Configuration (local or s3) ─────────────────────────────────
app.storage.type=${STORAGE_TYPE:local}
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}
aws.region=${AWS_REGION:ap-south-2}
aws.s3.bucket=${AWS_S3_BUCKET:}
