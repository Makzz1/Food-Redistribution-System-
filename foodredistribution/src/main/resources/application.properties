spring.application.name=foodredistribution

spring.datasource.url=jdbc:mysql://localhost:3308/foodredistribution

spring.datasource.username=root

spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refresh-expiration=604800000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=naahuh.foodwaste@gmail.com
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# Serve uploaded files at /uploads/**
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# ── Claim lifecycle timing (minutes) ─────────────────────────────────────────
# How long the donor must wait before marking receiver as no-show
claim.no-show.wait-minutes=30
# How long either party must wait before raising a dispute
# (gives the other party a fair chance to arrive or respond)
claim.dispute.wait-minutes=45

# Elasticsearch Configuration
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
elasticsearch.sync.enabled=true
