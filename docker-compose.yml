services:
  # 1. The Backend Service
  backend:
    build:
      context: ./foodredistribution
    ports:
      - "8080:8080"
    environment:
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Dynamic URLs — change in .env for production
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8080}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost}
      - DDL_AUTO=${DDL_AUTO:-update}
      - SHOW_SQL=${SHOW_SQL:-false}
      - STORAGE_TYPE=${STORAGE_TYPE}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
    volumes:
      # Persist uploaded files across container restarts
      - ./foodredistribution/uploads:/app/uploads
    networks:
      - food_network
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - redis

  # 2. The Frontend Service
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    ports:
      # Map localhost:80 (standard HTTP) to container port 80 (Nginx)
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - food_network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # 3. Redis Cache Service
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - food_network

# This creates a private network for the containers to talk to each other
networks:
  food_network:
